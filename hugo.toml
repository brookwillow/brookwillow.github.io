baseURL = "https://brookwillow.github.io/"
title = "我的博客"
theme = "PaperMod"
languageCode = "zh"
defaultContentLanguage = "zh"
hasCJKLanguage = true
enableRobotsTXT = true

[pagination]
  pagerSize = 10
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  env = "production"
  title = "我的博客"
  description = "分享技术、生活与思考"
  keywords = ["博客", "技术", "生活"]
  author = "博主"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowWordCount = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowFullTextinRSS = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "晴耕雨读，溪流自摇"
    Content = "一等人修身齐家，两家事读书耕田"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/brookwillow"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/yourusername"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.label]
    text = "我的博客"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/archives/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 30

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
